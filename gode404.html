<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 – Page Not Found</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #fff;
      color: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }

    .container { max-width: 400px; }

    .code {
      font-size: 120px;
      font-weight: 600;
      line-height: 1;
      letter-spacing: -4px;
      color: #111;
    }

    h1 {
      font-size: 22px;
      font-weight: 500;
      margin: 0.5rem 0 0.75rem;
    }

    p {
      font-size: 15px;
      color: #666;
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .btn-row {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      padding: 10px 24px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      text-decoration: none;
      border: 1px solid #ddd;
      background: #fff;
      color: #111;
    }

    .btn:hover { background: #f5f5f5; }

    .btn.primary {
      background: #111;
      color: #fff;
      border-color: transparent;
    }

    .btn.primary:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="container">
    <div class="code">404</div>
    <h1>Page not found</h1>
    <p>The page you're looking for doesn't exist or has been moved to another URL.</p>
    <div class="btn-row">
      <a href="/" class="btn primary">Go home</a>
      <a href="/contact" class="btn">Get help</a>
    </div>
  </div>
</body>
</html>
